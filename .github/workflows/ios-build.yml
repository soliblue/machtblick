name: iOS Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/ios/**'
      - 'apps/bundestag/src/views/datenschutz/Datenschutz.tsx'
      - 'apps/bundestag/src/views/impressum/Impressum.tsx'
      - 'apps/bundestag/src/views/impressum/impressumCopy.ts'
      - 'apps/bundestag/src/views/methodik/Methodik.tsx'
      - 'apps/bundestag/src/views/methodik/methodikCopy.ts'
      - 'fastlane/Fastfile'
      - '.github/scripts/asc_*.py'
      - '.github/workflows/ios-build.yml'
      - '.github/workflows/ios-testflight.yml'

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and smoke test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          xcodebuild -version

      - name: Check localizations
        run: node apps/ios/scripts/check-localizations.mjs

      - name: Check Settings content parity
        run: node apps/ios/scripts/check-settings-content-parity.mjs

      - name: Check More UI contract
        run: node apps/ios/scripts/check-more-ui-contract.mjs

      - name: Check language contract
        run: |
          xcrun swiftc \
            apps/ios/src/Core/Localization/AppLanguage.swift \
            apps/ios/src/Core/Localization/AppLocale.swift \
            apps/ios/src/Core/UI/Formatters.swift \
            apps/ios/scripts/LanguageContractCheck.swift \
            -o "$RUNNER_TEMP/machtblick-language-contract"
          "$RUNNER_TEMP/machtblick-language-contract"

      - name: Check theme contract
        run: |
          xcrun swiftc \
            apps/ios/src/Core/Theme/AppTheme.swift \
            apps/ios/scripts/ThemeContractCheck.swift \
            -o "$RUNNER_TEMP/machtblick-theme-contract"
          "$RUNNER_TEMP/machtblick-theme-contract"

      - name: Check member payload compatibility
        run: |
          xcrun swiftc \
            apps/ios/src/Features/Votes/Logic/PartyPosition.swift \
            apps/ios/src/Features/Votes/Logic/VoteResult.swift \
            apps/ios/src/Features/Votes/Logic/BallotChoice.swift \
            apps/ios/src/Features/Members/Logic/MemberDetailPayload.swift \
            apps/ios/scripts/MemberPayloadContractCheck.swift \
            -o "$RUNNER_TEMP/machtblick-member-payload-contract"
          "$RUNNER_TEMP/machtblick-member-payload-contract"

      - name: Check release scripts
        run: |
          node apps/ios/scripts/check-release-version.mjs
          python3 -m py_compile \
            .github/scripts/asc_api.py \
            .github/scripts/asc_certs.py \
            .github/scripts/asc_testflight.py
          ruby -c fastlane/Fastfile

      - name: Build without signing
        run: |
          set -o pipefail
          xcodebuild build \
            -project apps/ios/iOS.xcodeproj \
            -scheme Machtblick \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/machtblick-build" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Check compiled localization bundles
        run: |
          xcrun swiftc \
            apps/ios/src/Core/Localization/AppLanguage.swift \
            apps/ios/src/Core/Localization/AppLocale.swift \
            apps/ios/scripts/LocalizedBundleContractCheck.swift \
            -o "$RUNNER_TEMP/machtblick-localized-bundle-contract"
          "$RUNNER_TEMP/machtblick-localized-bundle-contract" \
            "$RUNNER_TEMP/machtblick-build/Build/Products/Debug-iphonesimulator/Machtblick.app"

      - name: Smoke launch German and English
        timeout-minutes: 10
        run: |
          IOS_RUNTIME="$(xcrun simctl list runtimes --json | python3 -c 'import json,sys; rows=[x for x in json.load(sys.stdin)["runtimes"] if x["isAvailable"] and x["name"].startswith("iOS")]; print(max(rows, key=lambda x: tuple(map(int, x["version"].split("."))))["identifier"])')"
          SMOKE_UDID="$(xcrun simctl list devices available --json | python3 -c 'import json,sys; print(next(x["udid"] for x in json.load(sys.stdin)["devices"][sys.argv[1]] if x["name"].startswith("iPhone") and x["state"] == "Shutdown"))' "$IOS_RUNTIME")"
          echo "SMOKE_UDID=$SMOKE_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SMOKE_UDID"
          xcrun simctl bootstatus "$SMOKE_UDID" -b
          mkdir -p "$RUNNER_TEMP/machtblick-smoke"
          for SCENARIO in de:default:dark en:system:dark de:light:dark en:dark:light; do
            IFS=: read -r LANGUAGE APP_THEME DEVICE_APPEARANCE <<< "$SCENARIO"
            xcrun simctl ui "$SMOKE_UDID" appearance "$DEVICE_APPEARANCE"
            xcrun simctl install "$SMOKE_UDID" "$RUNNER_TEMP/machtblick-build/Build/Products/Debug-iphonesimulator/Machtblick.app"
            PREFERENCES="$(xcrun simctl get_app_container "$SMOKE_UDID" soli.Machtblick data)/Library/Preferences/soli.Machtblick.plist"
            mkdir -p "$(dirname "$PREFERENCES")"
            plutil -create binary1 "$PREFERENCES"
            plutil -insert appLanguage -string "$LANGUAGE" "$PREFERENCES"
            if [ "$APP_THEME" != "default" ]; then
              plutil -insert appTheme -string "$APP_THEME" "$PREFERENCES"
            fi
            for LAUNCH in 1 2; do
              LAUNCH_OUTPUT="$(xcrun simctl launch --terminate-running-process "$SMOKE_UDID" soli.Machtblick)"
              APP_PID="${LAUNCH_OUTPUT##*: }"
              sleep 8
              kill -0 "$APP_PID"
              if [ "$LAUNCH" = 2 ]; then
                xcrun simctl io "$SMOKE_UDID" screenshot "$RUNNER_TEMP/machtblick-smoke/${SCENARIO//:/-}.png"
              fi
              xcrun simctl terminate "$SMOKE_UDID" soli.Machtblick
            done
            xcrun simctl uninstall "$SMOKE_UDID" soli.Machtblick
          done

      - name: Exercise theme preference
        run: |
          xcrun simctl ui "$SMOKE_UDID" appearance dark
          xcodebuild test \
            -project apps/ios/iOS.xcodeproj \
            -scheme Machtblick \
            -destination "platform=iOS Simulator,id=$SMOKE_UDID" \
            -derivedDataPath "$RUNNER_TEMP/machtblick-build" \
            -resultBundlePath "$RUNNER_TEMP/machtblick-theme-tests.xcresult" \
            -only-testing:MachtblickUITests/ThemePreferenceUITests/testThemeSwitchingAndPersistence \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: appearance-language-simulator-smoke
          path: ${{ runner.temp }}/machtblick-smoke/*.png
          if-no-files-found: ignore

      - name: Upload theme preference result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: theme-preference-xcresult
          path: ${{ runner.temp }}/machtblick-theme-tests.xcresult
          if-no-files-found: ignore

      - name: Shut down smoke simulator
        if: always() && env.SMOKE_UDID != ''
        run: xcrun simctl shutdown "$SMOKE_UDID"
