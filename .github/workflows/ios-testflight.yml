name: Deploy iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      verify_build_number:
        description: Existing build number to verify without uploading
        required: false
        type: string
  push:
    tags:
      - 'ios-v*'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ${{ inputs.verify_build_number != '' && 'ubuntu-latest' || 'macos-15' }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        if: ${{ inputs.verify_build_number == '' }}
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          xcodebuild -version

      - name: Check localizations
        if: ${{ inputs.verify_build_number == '' }}
        run: node apps/ios/scripts/check-localizations.mjs

      - name: Check Settings content parity
        if: ${{ inputs.verify_build_number == '' }}
        run: node apps/ios/scripts/check-settings-content-parity.mjs

      - name: Check More UI contract
        if: ${{ inputs.verify_build_number == '' }}
        run: node apps/ios/scripts/check-more-ui-contract.mjs

      - name: Check language contract
        if: ${{ inputs.verify_build_number == '' }}
        run: |
          xcrun swiftc \
            apps/ios/src/Core/Localization/AppLanguage.swift \
            apps/ios/src/Core/Localization/AppLocale.swift \
            apps/ios/src/Core/UI/Formatters.swift \
            apps/ios/scripts/LanguageContractCheck.swift \
            -o "$RUNNER_TEMP/machtblick-language-contract"
          "$RUNNER_TEMP/machtblick-language-contract"

      - name: Check member payload compatibility
        if: ${{ inputs.verify_build_number == '' }}
        run: |
          xcrun swiftc \
            apps/ios/src/Features/Votes/Logic/PartyPosition.swift \
            apps/ios/src/Features/Votes/Logic/VoteResult.swift \
            apps/ios/src/Features/Votes/Logic/BallotChoice.swift \
            apps/ios/src/Features/Members/Logic/MemberDetailPayload.swift \
            apps/ios/scripts/MemberPayloadContractCheck.swift \
            -o "$RUNNER_TEMP/machtblick-member-payload-contract"
          "$RUNNER_TEMP/machtblick-member-payload-contract"

      - name: Install fastlane
        if: ${{ inputs.verify_build_number == '' }}
        run: gem install fastlane --version 2.237.0 --no-document

      - name: Decode certificate
        if: ${{ inputs.verify_build_number == '' }}
        env:
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
        run: |
          mkdir -p certs
          echo "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > certs/distribution.p12

      - name: Install provisioning profile
        if: ${{ inputs.verify_build_number == '' }}
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/machtblick.mobileprovision
          security cms -D -i /tmp/machtblick.mobileprovision > /tmp/machtblick.mobileprovision.plist
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/machtblick.mobileprovision.plist)"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/machtblick.mobileprovision.plist)"
          cp /tmp/machtblick.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Debug signing state
        if: ${{ inputs.verify_build_number == '' }}
        run: |
          security list-keychains
          security find-identity -v -p codesigning || true
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true

      - name: Install cert-cleanup dependencies
        run: pip3 install --break-system-packages requests cryptography

      - name: Resolve public TestFlight group
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: python3 .github/scripts/asc_testflight.py prepare

      - name: Snapshot dev certs before build
        if: ${{ inputs.verify_build_number == '' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: python3 .github/scripts/asc_certs.py snapshot /tmp/certs-before.json

      - name: Select existing TestFlight build
        if: ${{ inputs.verify_build_number != '' }}
        env:
          VERIFY_BUILD_NUMBER: ${{ inputs.verify_build_number }}
        run: |
          python3 - <<'PY'
          import os

          assert os.environ["VERIFY_BUILD_NUMBER"].isdigit()
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"TESTFLIGHT_BUILD_NUMBER={os.environ['VERIFY_BUILD_NUMBER']}\n")
              env.write("TESTFLIGHT_VERIFY_ATTEMPTS=1\n")
          PY

      - name: Build and upload to TestFlight
        if: ${{ inputs.verify_build_number == '' }}
        env:
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          cd fastlane
          fastlane ios beta_local

      - name: Verify public TestFlight link
        run: |
          python3 - <<'PY'
          import urllib.request
          body = urllib.request.urlopen("https://testflight.apple.com/join/r7RVrgtr").read().decode()
          assert "Join the Machtblick beta" in body
          assert "View in TestFlight" in body
          assert "This beta is full" not in body
          assert "isn’t accepting any new testers" not in body
          print("Public Machtblick TestFlight link is live.")
          PY

      - name: Verify uploaded public build
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: python3 .github/scripts/asc_testflight.py verify

      - name: Revoke dev cert created by this run
        if: ${{ always() && inputs.verify_build_number == '' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: python3 .github/scripts/asc_certs.py revoke-new /tmp/certs-before.json

      - name: Cleanup
        if: always()
        run: rm -rf certs/
