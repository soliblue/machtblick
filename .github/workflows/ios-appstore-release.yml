name: Submit iOS App Store Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Marketing version to submit, must match apps/ios/Config/Version.xcconfig
        required: true
        type: string
      build_number:
        description: TestFlight build number to submit, defaults to the latest for the version
        required: false
        type: string
      whats_new_de:
        description: German release notes shown on the App Store
        required: false
        type: string
        default: Verbesserungen und Fehlerbehebungen.
      whats_new_en:
        description: English release notes shown on the App Store
        required: false
        type: string
        default: Improvements and bug fixes.
      update_release_mode_only:
        description: Update automatic release without resubmitting an existing review
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ios-appstore-release
  cancel-in-progress: false

jobs:
  submit:
    name: Submit for App Store review
    if: github.actor == github.repository_owner && github.triggering_actor == github.repository_owner
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Check release version
        run: node apps/ios/scripts/check-release-version.mjs
      - name: Install fastlane
        run: gem install fastlane --version 2.237.0 --no-document
      - name: Install App Store dependencies
        run: pip3 install --break-system-packages requests==2.34.2 cryptography==49.0.0
      - name: Prepare App Store version
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/asc_appstore.py
      - name: Submit build for review
        if: ${{ !inputs.update_release_mode_only }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_BUILD_NUMBER_INPUT: ${{ inputs.build_number }}
          WHATS_NEW_DE: ${{ inputs.whats_new_de }}
          WHATS_NEW_EN: ${{ inputs.whats_new_en }}
        run: |
          cd fastlane
          fastlane ios release "version:$RELEASE_VERSION" "build_number:$RELEASE_BUILD_NUMBER_INPUT"
      - name: Summary
        if: ${{ !inputs.update_release_mode_only }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          echo "Submitted Machtblick $RELEASE_VERSION build $RELEASE_BUILD_NUMBER for App Store review." >> "$GITHUB_STEP_SUMMARY"
          echo "Release after approval is automatic." >> "$GITHUB_STEP_SUMMARY"
      - name: Release mode summary
        if: ${{ inputs.update_release_mode_only }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: echo "Machtblick $RELEASE_VERSION will release automatically after approval." >> "$GITHUB_STEP_SUMMARY"
